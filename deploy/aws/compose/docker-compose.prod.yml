services:
  backend:
    image: ${BACKEND_IMAGE}
    environment:
      APP_ENV: production
      APP_BASE_URL: ${APP_PUBLIC_ORIGIN}
      APP_FRONTEND_URL: ${APP_PUBLIC_ORIGIN}
      APP_ORCID_LIVE_VALIDATION: ${APP_ORCID_LIVE_VALIDATION:-true}
      APP_OPENALEX_ENABLED: ${APP_OPENALEX_ENABLED:-true}
      APP_OPENALEX_EMAIL: ${APP_OPENALEX_EMAIL:-jamesdkent21@gmail.com}
      APP_OPENALEX_API_KEY: ${APP_OPENALEX_API_KEY:-}
      APP_SEARCH_INCLUDE_PUBLICATION_ABSTRACTS: ${APP_SEARCH_INCLUDE_PUBLICATION_ABSTRACTS:-true}
      POSTGRES_DSN: ${POSTGRES_DSN}
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    image: ${FRONTEND_IMAGE}
    depends_on:
      - backend
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/expert-match/letsencrypt:/etc/letsencrypt:ro
      - /opt/expert-match/acme-challenge:/var/www/certbot:ro
