services:
  postgres:
    restart: unless-stopped

  backend:
    environment:
      APP_ENV: production
      APP_BASE_URL: ${APP_PUBLIC_ORIGIN}
      APP_FRONTEND_URL: ${APP_PUBLIC_ORIGIN}
      APP_ORCID_LIVE_VALIDATION: ${APP_ORCID_LIVE_VALIDATION:-true}
      APP_OPENALEX_ENABLED: ${APP_OPENALEX_ENABLED:-true}
      APP_OPENALEX_EMAIL: ${APP_OPENALEX_EMAIL:-}
      APP_OPENALEX_API_KEY: ${APP_OPENALEX_API_KEY:-}
      APP_SEARCH_INCLUDE_PUBLICATION_ABSTRACTS: ${APP_SEARCH_INCLUDE_PUBLICATION_ABSTRACTS:-true}
      POSTGRES_DSN: ${POSTGRES_DSN}
    restart: unless-stopped

  frontend:
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-}
      VIRTUAL_HOST: ${VIRTUAL_HOST:-${APP_DOMAIN:-}}
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST:-${APP_DOMAIN:-}}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      VIRTUAL_PORT: "80"
    networks:
      - default
      - nginx-proxy
    restart: unless-stopped

networks:
  nginx-proxy:
    external: true
    name: ${NGINX_PROXY_NETWORK:-nginx-proxy}
