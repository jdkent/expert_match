services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expert_match}
      POSTGRES_USER: ${POSTGRES_USER:-expert_match}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expert_match}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-expert_match} -d ${POSTGRES_DB:-expert_match}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data_pg17:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
      APP_ORCID_LIVE_VALIDATION: ${APP_ORCID_LIVE_VALIDATION:-true}
      APP_OPENALEX_ENABLED: ${APP_OPENALEX_ENABLED:-true}
      APP_OPENALEX_EMAIL: ${APP_OPENALEX_EMAIL:-jamesdkent21@gmail.com}
      APP_SEARCH_INCLUDE_PUBLICATION_ABSTRACTS: ${APP_SEARCH_INCLUDE_PUBLICATION_ABSTRACTS:-true}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql+psycopg://expert_match:expert_match@postgres:5432/expert_match}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - backend_model_cache:/tmp/expert-match-model-cache

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
    depends_on:
      backend:
        condition: service_started
    expose:
      - "5173"

volumes:
  backend_model_cache:
  postgres_data_pg17:
