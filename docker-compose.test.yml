services:
  postgres:
    environment:
      POSTGRES_DB: expert_match_test
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U expert_match -d expert_match_test",
        ]
    volumes:
      - postgres_data_test:/var/lib/postgresql/data

  backend:
    environment:
      APP_ENV: test
      APP_BASE_URL: http://frontend:5173
      APP_FRONTEND_URL: http://frontend:5173
      APP_EMBEDDING_PROVIDER: specter2
      APP_EMBEDDING_DIMENSION: 768
      APP_ORCID_LIVE_VALIDATION: "true"
      APP_OPENALEX_ENABLED: "true"
      POSTGRES_DSN: postgresql+psycopg://expert_match:expert_match@postgres:5432/expert_match_test

  frontend:
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:5173

volumes:
  postgres_data_test:
